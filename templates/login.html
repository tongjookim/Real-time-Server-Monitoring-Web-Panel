<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitor - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary:      #181C14;
            --primary-dark: #10130e;
            --primary-light:#2e3624;
            --accent:       #7cb342;
            --text:         #e8ead5;
            --text-muted:   #8a9a7a;
            --border:       #2e3624;
            --card-bg:      #1e2418;
            --danger:       #ef5350;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--primary);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrap {
            width: 100%;
            max-width: 380px;
            padding: 16px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-brand .brand-icon {
            width: 52px; height: 52px;
            background: var(--accent);
            border-radius: 14px;
            display: inline-flex;
            align-items: center; justify-content: center;
            font-size: 24px;
            color: #fff;
            margin-bottom: 12px;
        }
        .login-brand h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }
        .login-brand p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
        }

        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap i {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }
        .form-input {
            width: 100%;
            background: var(--primary);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 10px 12px 10px 34px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }
        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: var(--text-muted); }

        .btn-login {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 7px;
            padding: 11px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: background 0.15s;
        }
        .btn-login:hover { background: #8bc34a; }

        .alert-error {
            background: rgba(239,83,80,0.12);
            border: 1px solid rgba(239,83,80,0.3);
            border-radius: 7px;
            padding: 10px 12px;
            font-size: 12px;
            color: var(--danger);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .login-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-brand">
            <div class="brand-icon"><i class="bi bi-hdd-rack"></i></div>
            <h1>Server Monitor</h1>
            <p>관리자 인증이 필요합니다</p>
        </div>

        <div class="login-card">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert-error">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label class="form-label">아이디</label>
                    <div class="input-wrap">
                        <i class="bi bi-person"></i>
                        <input type="text" class="form-input" name="username"
                               placeholder="Username" autocomplete="username" autofocus required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">비밀번호</label>
                    <div class="input-wrap">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="form-input" name="password"
                               placeholder="Password" autocomplete="current-password" required>
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <i class="bi bi-shield-check"></i> 로그인
                </button>
            </form>
        </div>

        <div class="login-footer">
            <i class="bi bi-shield-lock"></i> SSH 터널링 또는 방화벽 제한 권장
        </div>
    </div>
</body>
</html>
